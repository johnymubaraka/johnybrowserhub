<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JohnyBrowserHub Splash</title>
    <link rel="icon" type="image/svg+xml" href="assets/app-icon.svg">
    <link rel="stylesheet" href="splash.css">
</head>
<body>
    <main class="splash-shell" aria-label="JohnyBrowserHub loading screen">
        <div class="splash-stage">
            <div class="splash-card">
                <div class="splash-brand-row">
                    <img src="assets/app-icon.svg" alt="JohnyBrowserHub icon" class="splash-icon">
                    <div class="splash-brand-copy">
                        <p class="splash-kicker">JohnyBrowserHub</p>
                        <h1>Launching your smart browser workspace</h1>
                    </div>
                </div>

                <p class="splash-copy">Preparing authentication, multi-tab browsing, downloads, deep tools, and your built-in AI assistant.</p>

                <div class="loading-cluster" aria-hidden="true">
                    <div class="orbit-loader">
                        <span class="orbit orbit-one"></span>
                        <span class="orbit orbit-two"></span>
                        <span class="orbit orbit-three"></span>
                    </div>
                    <div class="loading-copy">
                        <p class="loading-kicker">Loading</p>
                        <p class="loading-text">Starting JohnyBrowserHub in 4 seconds...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
