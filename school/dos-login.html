<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOS Login</title>
    <link rel="icon" type="image/svg+xml" href="../assets/app-icon.svg">
    <link rel="stylesheet" href="school-access.css">
</head>
<body data-role-login="dos">
    <main class="school-access-page">
        <div class="school-access-topbar">
            <a class="school-back-link" href="./register.html">Back to School Registration</a>
            <div class="school-access-badge">DOS Login</div>
        </div>

        <section class="school-login-shell" aria-label="DOS login">
            <article class="school-access-card school-login-card">
                <div class="school-access-card-shell">
                    <div class="school-access-icon-row">
                        <div class="school-stat-grid">
                            <div class="school-stat-chip">
                                <strong>DOS</strong>
                                <span>Admin</span>
                            </div>
                            <div class="school-stat-chip">
                                <strong>Password</strong>
                                <span>Login</span>
                            </div>
                        </div>
                    </div>

                    <h1>Login As DOS</h1>
                    <p class="school-access-copy">Sign in with your DOS email and password. After login you will go straight to the DOS dashboard for classes, students, teachers, modules, and report cards.</p>

                    <form id="school-role-login-form" class="school-form-stack">
                        <label class="school-form-field">
                            <span class="school-form-icon" aria-hidden="true">✉</span>
                            <input id="school-role-email" type="email" placeholder="DOS email" autocomplete="email" required>
                        </label>
                        <label class="school-form-field">
                            <span class="school-form-icon" aria-hidden="true">🔐</span>
                            <input id="school-role-access-code" type="password" placeholder="DOS password" autocomplete="current-password" required>
                        </label>

                        <button id="school-role-submit" class="school-action-button is-dos" type="submit">
                            Open DOS Dashboard
                        </button>
                    </form>
                </div>
            </article>
        </section>

        <p id="school-role-status" class="school-status-banner" data-state="info" role="status" aria-live="polite">
            Preparing DOS login...
        </p>
    </main>

    <script type="module" src="role-login.js"></script>
</body>
</html>
